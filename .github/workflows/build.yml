name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Set version and DEBUG=0 for production build
        run: |
          MAJOR_MINOR=$(grep -oP 'const char FIRMWARE_VERSION\[\] = "\K[0-9]+\.[0-9]+' src/main.cpp)
          VERSION="${MAJOR_MINOR}.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/const char FIRMWARE_VERSION\[\] = \".*\";/const char FIRMWARE_VERSION[] = \"$VERSION\";/" src/main.cpp
          sed -i 's/const int DEBUG = 1;/const int DEBUG = 0;/' src/main.cpp

      - name: Build standard firmware (LEGACY=false)
        run: pio run

      - name: Save standard firmware binary
        run: cp .pio/build/esp32-c3-devkitm-1/firmware.bin firmware.bin

      - name: Build legacy firmware (LEGACY=true)
        run: |
          sed -i 's/const bool LEGACY = false;/const bool LEGACY = true;/' src/main.cpp
          pio run
          cp .pio/build/esp32-c3-devkitm-1/firmware.bin firmware_legacy.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            firmware.bin
            firmware_legacy.bin

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v$VERSION" firmware.bin firmware_legacy.bin \
            --title "Firmware v$VERSION" \
            --notes "Automated firmware build v$VERSION (run #${{ github.run_number }})"
