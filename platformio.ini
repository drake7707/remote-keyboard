; PlatformIO project configuration for BarButtons Mod
; Build: pio run
; Upload: pio run --target upload
; Monitor: pio device monitor

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
build_flags =
   -DARDUINO_USB_MODE=1
   -DARDUINO_USB_CDC_ON_BOOT=1    

; Match the Arduino IDE "Minimal SPIFFS (1.9MB APP with OTA/190KB SPIFFS)" partition scheme
board_build.partitions = min_spiffs.csv

; Serial monitor baud rate
monitor_speed = 9600

; Library dependencies (pinned to the same versions used in the previous Arduino CLI build)
lib_deps =
    h2zero/NimBLE-Arduino@^2.4.0
    Chris--A/Keypad@^3.1.1
