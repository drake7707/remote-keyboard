; PlatformIO project configuration for Remote Buttons
; Build: pio run
; Upload: pio run --target upload
; Monitor: pio device monitor

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf

; OTA-capable partition table (two 1.9 MB app slots + 64 KB SPIFFS)
board_build.partitions = partitions.csv

; Serial monitor baud rate
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

lib_deps =
    h2zero/esp-nimble-cpp@^2.5.0

; Minify src/config.html -> src/config.min.html before each build
extra_scripts = pre:scripts/minify_html.py

; Embed the minified web config page directly into the firmware binary.
; Symbol names are derived from the path (separators and dots -> underscores):
;   src/config.min.html -> _binary_src_config_min_html_start / _end
board_build.embed_txtfiles = src/config.min.html